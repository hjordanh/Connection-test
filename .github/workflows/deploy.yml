name: Deploy

# Builds the server image, pushes it to GHCR, then tells the cloud instance to
# pull + restart via AWS SSM (no inbound SSH). Runs on pushes to main and on
# version tags; can also be triggered manually.
on:
  push:
    branches: [ main ]
    tags: [ "v*" ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write        # push to GitHub Container Registry

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # built-in; no secret to set
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=ref,event=tag
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    # Skip on plain feature-branch pushes if this workflow is ever run there.
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Pull + restart on the instance via SSM
        run: |
          CMD_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy connection-monitor ${GITHUB_SHA::7}" \
            --parameters commands='cd /opt/connection-monitor && docker compose pull && docker compose up -d && docker image prune -f' \
            --query "Command.CommandId" --output text)
          echo "SSM command: $CMD_ID"
          aws ssm wait command-executed \
            --command-id "$CMD_ID" --instance-id "${{ secrets.INSTANCE_ID }}" || true
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" --instance-id "${{ secrets.INSTANCE_ID }}" \
            --query "{Status:Status,Out:StandardOutputContent,Err:StandardErrorContent}" \
            --output json
